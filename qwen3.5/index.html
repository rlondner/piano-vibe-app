<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Piano - 5 Octave Synthesizer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
    <!-- Click to Start Overlay -->
    <div id="start-overlay" class="overlay">
        <div class="overlay-content glass-panel">
            <h1>Glass Piano</h1>
            <p>A 5-octave polyphonic synthesizer</p>
            <button id="start-btn" class="glass-button">Click to Start</button>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app-container" class="hidden">
        <!-- Top Controls -->
        <header class="controls-header glass-panel">
            <div class="control-group">
                <label for="instrument-select">Instrument</label>
                <select id="instrument-select" class="glass-select">
                    <option value="fender-rhodes">Fender Rhodes</option>
                    <option value="wurlitzer">Wurlitzer Electronic Piano</option>
                    <option value="yamaha-cp70">Yamaha CP-70</option>
                    <option value="yamaha-cp80">Yamaha CP-80</option>
                    <option value="hohner-clavinet">Hohner Clavinet</option>
                    <option value="hohner-pianet">Hohner Pianet</option>
                    <option value="juno-106">Juno 106</option>
                    <option value="rmi-electra">RMI Electra-piano</option>
                    <option value="yamaha-dx7">Yamaha DX7 Organ</option>
                    <option value="nord-stage">Clavia Nord Stage 4 Grand Piano</option>
                </select>
            </div>

            <div class="control-group">
                <label for="input-mode-toggle">Input Mode</label>
                <div class="toggle-container">
                    <span class="toggle-label">Keyboard</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="input-mode-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="toggle-label">Touch</span>
                </div>
            </div>

            <div class="control-group">
                <label for="feedback-style-toggle">Visual Feedback</label>
                <div class="toggle-container">
                    <span class="toggle-label">Depress</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="feedback-style-toggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="toggle-label">Color</span>
                </div>
            </div>
        </header>

        <!-- Recording Controls -->
        <div class="recording-controls glass-panel">
            <button id="record-btn" class="glass-button record-btn">
                <span class="record-icon"></span>
                Record
            </button>
            <button id="download-btn" class="glass-button download-btn" disabled>
                <span class="download-icon"></span>
                Stop / Download
            </button>
            <span id="recording-status" class="recording-status"></span>
        </div>

        <!-- Swipeable Octave Ribbon -->
        <div class="octave-ribbon-container glass-panel">
            <div class="ribbon-indicator">
                <svg class="arrow-left" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </div>
            <div id="octave-ribbon" class="octave-ribbon">
                <span id="current-octave-display">Current: C3 - B3</span>
            </div>
            <div class="ribbon-indicator">
                <svg class="arrow-right" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </div>
        </div>

        <!-- Piano Container -->
        <div class="piano-wrapper">
            <div id="piano-container" class="piano-container">
                <!-- Keys will be generated by JavaScript -->
            </div>
        </div>

        <!-- Instructions Footer -->
        <footer class="instructions-footer glass-panel">
            <p><strong>Keyboard Mode:</strong> White keys = A S D F G H J | Black keys = W E T Y U | Arrows ↑↓ to change octave</p>
            <p><strong>Touch Mode:</strong> Click/tap keys or swipe the ribbon to navigate octaves</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
