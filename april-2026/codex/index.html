<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Glass Poly Piano</title>
<script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
<style>
:root{--glass:rgba(255,255,255,.1);--border:rgba(255,255,255,.2);--text:rgba(255,255,255,.92);--muted:rgba(255,255,255,.66);--a:#6ee7f9;--b:#f0abfc;font-family:Inter,ui-sans-serif,system-ui,Segoe UI,sans-serif;color-scheme:dark}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}body{min-height:100vh;margin:0;overflow-x:hidden;color:var(--text);background:radial-gradient(circle at 18% 12%,rgba(240,171,252,.25),transparent 28rem),radial-gradient(circle at 82% 28%,rgba(45,212,191,.18),transparent 28rem),linear-gradient(135deg,#21104d,#132257 46%,#07111f)}
button,select{font:inherit}.app{width:min(1180px,calc(100vw - 24px));min-height:100vh;margin:auto;padding:20px 0 18px;display:grid;grid-template-rows:auto 1fr;gap:16px}.toolbar,.ribbon,.piano{background:var(--glass);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--border);box-shadow:0 24px 70px rgba(0,0,0,.34)}
.toolbar{border-radius:18px;padding:14px;display:grid;grid-template-columns:minmax(220px,1.4fr) auto auto auto;gap:12px;align-items:end}.field{display:grid;gap:6px;min-width:0}label,.cap{font-size:.76rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0}
select{width:100%;min-height:42px;border:1px solid var(--border);border-radius:12px;padding:0 12px;color:var(--text);background:rgba(255,255,255,.12);outline:0}option{color:#10131f;background:#f7f7fb}
.seg{min-height:42px;display:inline-grid;grid-auto-flow:column;border:1px solid var(--border);border-radius:13px;background:rgba(255,255,255,.08);overflow:hidden}.seg button{min-height:42px;border:0;padding:0 13px;color:var(--muted);background:transparent;cursor:pointer;white-space:nowrap}.seg button.on{color:#07111f;background:linear-gradient(135deg,var(--a),var(--b));font-weight:900}.seg button:disabled{opacity:.45;cursor:not-allowed}
.stage{min-height:0;display:grid;align-content:end;gap:10px}.status{min-height:24px;display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:.86rem;padding:0 6px}.ribbon{height:60px;border-radius:16px;display:grid;grid-template-columns:54px 1fr 54px;place-items:center;cursor:grab;touch-action:pan-y}.ribbon.drag{cursor:grabbing}.arrow{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.08);font-size:1.5rem}.range{font-size:clamp(1rem,2.8vw,1.35rem);font-weight:900;text-align:center;transform:translateX(var(--dx,0));transition:transform .15s}
.piano{--wc:7;border-radius:18px;padding:14px;min-height:clamp(250px,48vh,430px);display:grid}.keys{position:relative;width:100%;min-height:230px;display:grid;grid-template-columns:repeat(var(--wc),minmax(0,1fr));gap:4px}.key{position:relative;border:1px solid rgba(255,255,255,.32);border-radius:0 0 11px 11px;cursor:pointer;touch-action:none;transition:transform .08s,box-shadow .08s,background .08s,filter .08s}.white{height:100%;background:linear-gradient(#fff,rgba(211,226,244,.9));box-shadow:inset 0 -16px 22px rgba(11,22,44,.14),0 10px 18px rgba(0,0,0,.22);color:rgba(14,19,32,.72);z-index:1}.black{position:absolute;top:0;width:calc((100% - (var(--wc) - 1)*4px)/var(--wc)*.62);height:61%;background:linear-gradient(#24253b,#090b15);box-shadow:inset 0 -12px 18px rgba(0,0,0,.38),0 10px 20px rgba(0,0,0,.42);color:rgba(255,255,255,.55);z-index:3;transform:translateX(-50%)}
.name,.map{position:absolute;left:50%;transform:translateX(-50%);pointer-events:none;white-space:nowrap}.white .name{bottom:14px;font-weight:900;font-size:clamp(.72rem,1.8vw,.95rem)}.white .map{bottom:38px;font-size:clamp(.62rem,1.5vw,.78rem);opacity:.7}.black .name{bottom:12px;font-size:clamp(.58rem,1.25vw,.72rem);font-weight:900}.black .map{bottom:32px;font-size:clamp(.52rem,1.15vw,.66rem);opacity:.7}
body.color .key.active.white{background:linear-gradient(#9ff4ff,#f0abfc);color:#07111f}body.color .key.active.black{background:linear-gradient(#67e8f9,#a855f7);color:#07111f}body.depress .key.active.white{transform:translateY(8px);box-shadow:inset 0 -5px 12px rgba(11,22,44,.25),0 4px 10px rgba(0,0,0,.2)}body.depress .key.active.black{transform:translateX(-50%) translateY(7px);box-shadow:inset 0 -4px 10px rgba(0,0,0,.42),0 4px 10px rgba(0,0,0,.32)}
.overlay{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:22px;background:rgba(6,9,20,.42);backdrop-filter:blur(14px)}.card{width:min(420px,100%);border-radius:22px;padding:28px;text-align:center;background:var(--glass);border:1px solid var(--border);box-shadow:0 24px 70px rgba(0,0,0,.34)}.card h1{margin:0 0 8px;font-size:clamp(2rem,8vw,3.3rem)}.card p{margin:0 0 22px;color:var(--muted)}.card button{width:100%;min-height:48px;border:0;border-radius:14px;color:#07111f;background:linear-gradient(135deg,var(--a),var(--b));font-weight:900;cursor:pointer}.hidden{display:none}
@media (max-width:760px),(orientation:portrait){.app{width:min(100vw - 14px,720px);padding-top:8px}.toolbar{grid-template-columns:1fr;border-radius:16px}.seg{width:100%;grid-auto-columns:1fr}.piano{padding:9px;min-height:44vh}.keys{gap:3px}}
</style>
</head>
<body class="color">
<main class="app">
<section class="toolbar">
<div class="field"><label for="preset">Instrument</label><select id="preset"><option>Fender Rhodes</option><option>Wurlitzer Electronic Piano</option><option>Yamaha CP-70</option><option>Yamaha CP-80</option><option>Hohner Clavinet</option><option>Hohner Pianet</option><option>Juno 106</option><option>RMI Electra-piano</option><option>Yamaha DX7 organ</option><option>Clavia Nord Stage 4 Grand Piano</option></select></div>
<div><div class="cap">Input</div><div class="seg"><button id="km" class="on">Hardware</button><button id="tm">Touch</button></div></div>
<div><div class="cap">Feedback</div><div class="seg"><button id="cf" class="on">Color</button><button id="df">Depress</button></div></div>
<div><div class="cap">Recorder</div><div class="seg"><button id="rec">Record</button><button id="stop" disabled>Stop/Download</button></div></div>
</section>
<section class="stage">
<div class="status"><span id="stat">Ready</span><span id="hint">A S D F G H J / W E T Y U</span></div>
<div id="ribbon" class="ribbon" role="button" tabindex="0" aria-label="Swipe octave ribbon"><span class="arrow">&#8249;</span><span id="range" class="range">Current: C3 - B3</span><span class="arrow">&#8250;</span></div>
<div class="piano"><div id="keys" class="keys" aria-label="Piano keys"></div></div>
</section>
</main>
<div id="overlay" class="overlay"><div class="card"><h1>Glass Piano</h1><p>Tap once to unlock the audio engine.</p><button id="start">Click to Start</button></div></div>
<script>
const O=[2,3,4,5,6],W=["C","D","E","F","G","A","B"],B=[["C#",0],["D#",1],["F#",3],["G#",4],["A#",5]],KW=["a","s","d","f","g","h","j"],KB=["w","e","t","y","u"];
const $=id=>document.getElementById(id),keys=$("keys"),range=$("range"),ribbon=$("ribbon"),preset=$("preset"),overlay=$("overlay"),stat=$("stat"),hint=$("hint"),rec=$("rec"),stop=$("stop");
let synth,ready=false,mode="keyboard",startIdx=1,vis=1,ptr=new Map(),kbd=new Map(),playing=new Map(),rnode,rsink,buffs=[],recording=false,sr=44100;
const max=()=>Math.max(0,O.length-vis),visible=()=>O.slice(startIdx,startIdx+vis);
function fit(){vis=(matchMedia("(orientation: portrait)").matches||innerWidth<760)?1:2;startIdx=Math.min(startIdx,max());render()}
new ResizeObserver(fit).observe(document.body);addEventListener("orientationchange",fit);
function fx(){return{chor:(f,d,dep,w)=>new Tone.Chorus(f,d,dep).set({wet:w}).start(),trem:(f,d,w)=>new Tone.Tremolo(f,d).set({wet:w}).start(),rev:(d,w)=>new Tone.Reverb({decay:d,wet:w})}}
function make(name){if(synth)synth.dispose();const F=fx(),D=Tone.Destination,c=(i,e=[])=>{let n=i;e.forEach(x=>{n.connect(x);n=x});n.connect(D);return i};
const m={
"Fender Rhodes":()=>c(new Tone.PolySynth(Tone.FMSynth,{maxPolyphony:16,volume:-8,options:{harmonicity:2.8,modulationIndex:10,oscillator:{type:"sine"},envelope:{attack:.012,decay:1.3,sustain:.22,release:1.6},modulation:{type:"triangle"},modulationEnvelope:{attack:.003,decay:.38,sustain:.08,release:.9}}}),[F.chor(1.1,3.5,.45,.32),F.rev(2.1,.18)]),
"Wurlitzer Electronic Piano":()=>c(new Tone.PolySynth(Tone.FMSynth,{maxPolyphony:16,volume:-9,options:{harmonicity:3.1,modulationIndex:7,oscillator:{type:"triangle"},envelope:{attack:.006,decay:.7,sustain:.32,release:.8},modulationEnvelope:{attack:.002,decay:.18,sustain:.12,release:.5}}}),[new Tone.Distortion({distortion:.18,wet:.18}),F.trem(5.8,.28,.34),F.rev(1.4,.12)]),
"Yamaha CP-70":()=>c(new Tone.PolySynth(Tone.Synth,{maxPolyphony:18,volume:-8,options:{oscillator:{type:"fatsawtooth",count:2,spread:14},envelope:{attack:.008,decay:1,sustain:.18,release:1.2}}}),[new Tone.Filter(4200,"lowpass"),F.chor(.75,2.8,.25,.22),F.rev(1.7,.16)]),
"Yamaha CP-80":()=>c(new Tone.PolySynth(Tone.Synth,{maxPolyphony:18,volume:-8,options:{oscillator:{type:"fatsquare",count:2,spread:9},envelope:{attack:.007,decay:1.15,sustain:.2,release:1.45}}}),[new Tone.Filter(5000,"lowpass"),F.chor(.9,3.2,.22,.18),F.rev(2,.15)]),
"Hohner Clavinet":()=>c(new Tone.PolySynth(Tone.MonoSynth,{maxPolyphony:12,volume:-11,options:{oscillator:{type:"sawtooth"},filter:{Q:8,type:"bandpass",rolloff:-24},envelope:{attack:.002,decay:.18,sustain:.02,release:.12},filterEnvelope:{attack:.001,decay:.12,sustain:.08,release:.08,baseFrequency:350,octaves:4.2}}}),[new Tone.AutoWah(85,5,-18).set({wet:.36}),new Tone.Distortion({distortion:.1,wet:.16})]),
"Hohner Pianet":()=>c(new Tone.PolySynth(Tone.AMSynth,{maxPolyphony:14,volume:-10,options:{harmonicity:1.6,oscillator:{type:"sine"},envelope:{attack:.01,decay:.65,sustain:.2,release:1},modulation:{type:"square"},modulationEnvelope:{attack:.01,decay:.3,sustain:.1,release:.6}}}),[new Tone.Filter(3200,"lowpass"),F.trem(4.4,.18,.22),F.rev(1.8,.14)]),
"Juno 106":()=>c(new Tone.PolySynth(Tone.Synth,{maxPolyphony:18,volume:-12,options:{oscillator:{type:"fatsawtooth",count:3,spread:22},envelope:{attack:.045,decay:.45,sustain:.62,release:1.25}}}),[new Tone.Filter(2600,"lowpass"),F.chor(1.7,4.5,.72,.48),F.rev(2.4,.16)]),
"RMI Electra-piano":()=>c(new Tone.PolySynth(Tone.Synth,{maxPolyphony:16,volume:-13,options:{oscillator:{type:"pulse",width:.34},envelope:{attack:.004,decay:.55,sustain:.24,release:.55}}}),[new Tone.Filter(3600,"lowpass"),new Tone.BitCrusher({bits:7,wet:.12}),F.rev(1.2,.08)]),
"Yamaha DX7 organ":()=>c(new Tone.PolySynth(Tone.FMSynth,{maxPolyphony:18,volume:-11,options:{harmonicity:1.01,modulationIndex:18,oscillator:{type:"sine"},envelope:{attack:.006,decay:.18,sustain:.9,release:.5},modulationEnvelope:{attack:.006,decay:.4,sustain:.45,release:.45}}}),[F.chor(.55,2.8,.35,.24),F.rev(2.3,.18)]),
"Clavia Nord Stage 4 Grand Piano":()=>c(new Tone.PolySynth(Tone.FMSynth,{maxPolyphony:20,volume:-8,options:{harmonicity:1.5,modulationIndex:4.5,oscillator:{type:"sine"},envelope:{attack:.004,decay:1.5,sustain:.12,release:1.4},modulationEnvelope:{attack:.001,decay:.25,sustain:.02,release:.7}}}),[new Tone.EQ3({low:1.5,mid:-1,high:2}),F.rev(2.5,.2)])};
synth=m[name]()}
async function boot(){if(ready)return;await Tone.start();Tone.Destination.volume.value=-3;make(preset.value);recorder();ready=true;overlay.classList.add("hidden");stat.textContent="Audio engine running"}
function on(note,id){boot().then(()=>{if(!synth||playing.has(id))return;playing.set(id,note);synth.triggerAttack(note);active(note,1);stat.textContent=note+" playing"})}
function off(note,id){if(!synth||!playing.has(id))return;playing.delete(id);synth.triggerRelease(note);active(note,0);stat.textContent="Ready"}
function active(note,v){document.querySelectorAll(`[data-note="${note}"]`).forEach(e=>e.classList.toggle("active",v))}
function render(){const os=visible(),wc=os.length*7;keys.innerHTML="";keys.style.setProperty("--wc",wc);os.forEach((o,oi)=>W.forEach((n,wi)=>addKey(n+o,"white",oi*7+wi+1)));os.forEach((o,oi)=>B.forEach(([n,a])=>addKey(n+o,"black",oi*7+a+1)));range.textContent=`Current: C${os[0]} - B${os[os.length-1]}`;hint.textContent=mode==="keyboard"?"A S D F G H J / W E T Y U":"Touch and mouse polyphony"}
function label(note){if(+note.at(-1)!==O[startIdx])return"";const n=note.slice(0,-1),wi=W.indexOf(n);if(wi>-1)return KW[wi].toUpperCase();const bi=B.findIndex(x=>x[0]===n);return bi>-1?KB[bi].toUpperCase():""}
function addKey(note,type,pos){const k=document.createElement("button");k.type="button";k.className=`key ${type}`;k.dataset.note=note;k.ariaLabel=note;k.innerHTML=`<span class="map">${label(note)}</span><span class="name">${note}</span>`;if(type==="white")k.style.gridColumn=pos;else k.style.left=`calc((100% / ${getComputedStyle(keys).getPropertyValue("--wc")||7}) * ${pos})`;events(k,note);keys.appendChild(k)}
function events(k,note){k.onmousedown=e=>{if(mode!=="touch"||e.button)return;const id="m:"+note;ptr.set(id,note);on(note,id)};k.onmouseenter=e=>{if(mode==="touch"&&e.buttons===1){const id="m:"+note;ptr.set(id,note);on(note,id)}};k.onmouseup=k.onmouseleave=()=>rel("m:"+note);k.addEventListener("touchstart",e=>{if(mode!=="touch")return;e.preventDefault();[...e.changedTouches].forEach(t=>{const el=document.elementFromPoint(t.clientX,t.clientY)?.closest(".key");if(el){const id="t:"+t.identifier;ptr.set(id,el.dataset.note);on(el.dataset.note,id)}})},{passive:false})}
function rel(id){const n=ptr.get(id);if(!n)return;off(n,id);ptr.delete(id)}
function releaseTouches(e){if(mode!=="touch")return;[...e.changedTouches].forEach(t=>rel("t:"+t.identifier))}
document.addEventListener("touchend",releaseTouches,{passive:true});document.addEventListener("touchcancel",releaseTouches,{passive:true});document.addEventListener("mouseup",()=>[...ptr.keys()].filter(x=>x.startsWith("m:")).forEach(rel));
document.addEventListener("keydown",e=>{if(e.repeat)return;if(e.key==="ArrowUp")return shift(1);if(e.key==="ArrowDown")return shift(-1);if(mode!=="keyboard")return;const n=keyNote(e.key.toLowerCase());if(!n)return;e.preventDefault();kbd.set(e.key.toLowerCase(),n);on(n,e.key.toLowerCase())});
document.addEventListener("keyup",e=>{if(mode!=="keyboard")return;const id=e.key.toLowerCase(),n=kbd.get(id);if(!n)return;off(n,id);kbd.delete(id)});
function keyNote(k){const o=O[startIdx],wi=KW.indexOf(k);if(wi>-1)return W[wi]+o;const bi=KB.indexOf(k);return bi>-1?B[bi][0]+o:null}
function shift(d){startIdx=Math.max(0,Math.min(max(),startIdx+d));allOff();render()}
function allOff(){if(synth)synth.releaseAll();ptr.clear();kbd.clear();playing.clear();document.querySelectorAll(".active").forEach(e=>e.classList.remove("active"))}
let sx=0,drag=false;function bd(x){sx=x;drag=true;ribbon.classList.add("drag")}function md(x){if(drag)range.style.setProperty("--dx",Math.max(-70,Math.min(70,x-sx))+"px")}function ed(x){if(!drag)return;const d=x-sx;drag=false;ribbon.classList.remove("drag");range.style.setProperty("--dx","0");if(Math.abs(d)>42)shift(d<0?1:-1)}
ribbon.onmousedown=e=>bd(e.clientX);addEventListener("mousemove",e=>md(e.clientX));addEventListener("mouseup",e=>ed(e.clientX));ribbon.addEventListener("touchstart",e=>bd(e.changedTouches[0].clientX),{passive:true});ribbon.addEventListener("touchmove",e=>md(e.changedTouches[0].clientX),{passive:true});ribbon.addEventListener("touchend",e=>ed(e.changedTouches[0].clientX),{passive:true});ribbon.onkeydown=e=>{if(e.key==="ArrowLeft")shift(-1);if(e.key==="ArrowRight")shift(1)};
$("km").onclick=()=>setMode("keyboard");$("tm").onclick=()=>setMode("touch");function setMode(m){mode=m;allOff();$("km").classList.toggle("on",m==="keyboard");$("tm").classList.toggle("on",m==="touch");render()}
$("cf").onclick=()=>fb("color");$("df").onclick=()=>fb("depress");function fb(t){document.body.className=t;$("cf").classList.toggle("on",t==="color");$("df").classList.toggle("on",t==="depress")}
preset.onchange=()=>{if(ready){allOff();make(preset.value);stat.textContent=preset.value}};$("start").onclick=boot;document.addEventListener("pointerdown",boot,{once:true});
function recorder(){const c=Tone.getContext().rawContext;sr=c.sampleRate;const input=c.createGain();rnode=c.createScriptProcessor(4096,2,2);rsink=c.createGain();rsink.gain.value=0;Tone.Destination.connect(input);input.connect(rnode);rnode.connect(rsink);rsink.connect(c.destination);rnode.onaudioprocess=e=>{if(recording)buffs.push([new Float32Array(e.inputBuffer.getChannelData(0)),new Float32Array(e.inputBuffer.getChannelData(1))])}}
rec.onclick=async()=>{await boot();buffs=[];recording=true;rec.disabled=true;rec.classList.add("on");stop.disabled=false;stat.textContent="Recording"};stop.onclick=()=>{recording=false;rec.disabled=false;rec.classList.remove("on");stop.disabled=true;download(wav(buffs,sr),`glass-piano-${new Date().toISOString().replace(/[:.]/g,"-")}.wav`);stat.textContent="WAV downloaded"};
function wav(chunks,rate){const frames=chunks.reduce((s,c)=>s+c[0].length,0),buf=new ArrayBuffer(44+frames*4),v=new DataView(buf);ws(v,0,"RIFF");v.setUint32(4,36+frames*4,true);ws(v,8,"WAVE");ws(v,12,"fmt ");v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,2,true);v.setUint32(24,rate,true);v.setUint32(28,rate*4,true);v.setUint16(32,4,true);v.setUint16(34,16,true);ws(v,36,"data");v.setUint32(40,frames*4,true);let o=44;chunks.forEach(c=>{for(let i=0;i<c[0].length;i++){samp(v,o,c[0][i]);o+=2;samp(v,o,c[1][i]);o+=2}});return new Blob([v],{type:"audio/wav"})}
function samp(v,o,x){x=Math.max(-1,Math.min(1,x));v.setInt16(o,x<0?x*32768:x*32767,true)}function ws(v,o,s){for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))}
function download(blob,name){const u=URL.createObjectURL(blob),a=document.createElement("a");a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1000)}
fit();
</script>
</body>
</html>
