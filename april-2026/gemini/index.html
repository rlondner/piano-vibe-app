<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piano Vibe - Glassmorphic Polyphonic Synth</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
    <div id="start-overlay" class="overlay">
        <button id="start-btn">Click to Start Vibe</button>
    </div>

    <main class="app-container">
        <header class="glass-header">
            <div class="header-left">
                <h1>PianoVibe</h1>
                <select id="preset-select" class="glass-select">
                    <option value="rhodes">Fender Rhodes</option>
                    <option value="wurlitzer">Wurlitzer EP</option>
                    <option value="cp70">Yamaha CP-70</option>
                    <option value="cp80">Yamaha CP-80</option>
                    <option value="clavinet">Hohner Clavinet</option>
                    <option value="pianet">Hohner Pianet</option>
                    <option value="juno">Juno 106</option>
                    <option value="rmi">RMI Electra-piano</option>
                    <option value="dx7">Yamaha DX7 Organ</option>
                    <option value="nord">Nord Stage 4 Grand</option>
                </select>
            </div>
            
            <div class="header-right">
                <div class="toggle-group">
                    <label>Feedback:</label>
                    <button id="feedback-toggle" class="glass-btn small" data-value="color">Color Change</button>
                </div>
                <div class="toggle-group">
                    <label>Mode:</label>
                    <button id="mode-toggle" class="glass-btn small" data-value="touch">Touch/Mouse</button>
                </div>
                <div class="record-group">
                    <button id="record-btn" class="glass-btn record">● Record</button>
                    <button id="stop-btn" class="glass-btn" disabled>■ Stop/Download</button>
                </div>
            </div>
        </header>

        <section class="ribbon-container glass-panel">
            <div class="ribbon-arrow left">&larr;</div>
            <div id="octave-ribbon" class="ribbon-content">
                <span id="current-range">Range: C2 - B3</span>
            </div>
            <div class="ribbon-arrow right">&rarr;</div>
        </section>

        <section class="piano-viewport">
            <div id="piano-keys" class="piano-keys">
                <!-- Keys will be generated by JS -->
            </div>
        </section>
    </main>

    <script src="audio-engine.js"></script>
    <script src="piano-ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
