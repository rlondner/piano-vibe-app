<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Piano - 5-Octave Synthesizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="start-overlay">
        <div class="start-content">
            <h1>Vibe Piano</h1>
            <p>Polyphonic 5-Octave Synthesizer</p>
            <button id="start-btn">Click to Start</button>
        </div>
    </div>

    <div class="container">
        <!-- Top Controls Section -->
        <div class="controls-section">
            <div class="control-group">
                <label class="control-label">Instrument</label>
                <select id="instrument-select" class="glass-dropdown">
                    <option value="rhodes">Fender Rhodes</option>
                    <option value="wurlitzer">Wurlitzer Electronic Piano</option>
                    <option value="cp70">Yamaha CP-70</option>
                    <option value="cp80">Yamaha CP-80</option>
                    <option value="clavinet">Hohner Clavinet</option>
                    <option value="pianet">Hohner Pianet</option>
                    <option value="juno106">Juno 106</option>
                    <option value="electra">RMI Electra-piano</option>
                    <option value="dx7">Yamaha DX7 organ</option>
                    <option value="nord">Clavia Nord Stage 4 Grand Piano</option>
                </select>
            </div>

            <div class="control-group">
                <label class="control-label">Input Mode</label>
                <select id="input-mode-select" class="glass-dropdown">
                    <option value="hardware">Hardware Keyboard</option>
                    <option value="touch">Touch/Mouse</option>
                </select>
            </div>

            <div class="control-group">
                <label class="control-label">Visual Feedback</label>
                <select id="visual-feedback-select" class="glass-dropdown">
                    <option value="color">Color Change</option>
                    <option value="depress">Depress</option>
                </select>
            </div>

            <div class="control-group">
                <label class="control-label">Recording</label>
                <div class="recording-controls">
                    <button id="record-btn" class="record-btn">Record</button>
                    <button id="stop-btn" class="stop-btn" disabled>Stop/Download</button>
                </div>
            </div>
        </div>

        <!-- Octave Navigation Ribbon -->
        <div class="ribbon-container">
            <button id="prev-octave" class="nav-btn" title="Previous Octave">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                </svg>
            </button>
            <div class="octave-display">
                <span class="octave-range" id="octave-range">C3 - B3</span>
                <span class="octave-counter" id="octave-counter">1/5</span>
            </div>
            <button id="next-octave" class="nav-btn" title="Next Octave">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                </svg>
            </button>
        </div>

        <!-- Piano Keys Container -->
        <div class="piano-container" id="piano-container">
            <div class="keys-wrapper" id="keys-wrapper">
                <!-- Keys will be generated by JavaScript -->
            </div>
        </div>

        <!-- Keyboard Layout Hint -->
        <div class="keyboard-hint" id="keyboard-hint">
            <p class="hint-title">Hardware Keyboard Layout (Visible Octave)</p>
            <div class="key-mapping">
                <span class="white-key-label">A</span>
                <span class="white-key-label">S</span>
                <span class="white-key-label">D</span>
                <span class="white-key-label">F</span>
                <span class="white-key-label">G</span>
                <span class="white-key-label">H</span>
                <span class="white-key-label">J</span>
            </div>
            <div class="black-key-labels">
                <span class="black-key-label">W</span>
                <span class="black-key-label">E</span>
                <span class="black-key-label">T</span>
                <span class="black-key-label">Y</span>
                <span class="black-key-label">U</span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
