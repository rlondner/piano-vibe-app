<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glassmorphic Poly Piano</title>
    <link rel="stylesheet" href="style.css">
    <!-- Tone.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
    <div id="start-overlay">
        <button id="start-btn">Click to Start</button>
    </div>

    <div class="app-container">
        <header class="glass-panel top-bar">
            <div class="control-group">
                <label for="preset-select">Instrument</label>
                <select id="preset-select" class="glass-select">
                    <option value="fenderRhodes">Fender Rhodes</option>
                    <option value="wurlitzer">Wurlitzer</option>
                    <option value="yamahaCP70">Yamaha CP-70</option>
                    <option value="yamahaCP80">Yamaha CP-80</option>
                    <option value="clavinet">Hohner Clavinet</option>
                    <option value="pianet">Hohner Pianet</option>
                    <option value="juno106">Juno 106</option>
                    <option value="rmiElectra">RMI Electra-piano</option>
                    <option value="dx7Organ">Yamaha DX7 Organ</option>
                    <option value="nordGrand">Nord Stage 4 Grand</option>
                </select>
            </div>

            <div class="control-group">
                <label>Feedback</label>
                <div class="toggle-switch" id="feedback-toggle">
                    <span class="toggle-label active" data-value="color">Color</span>
                    <span class="toggle-label" data-value="depress">Depress</span>
                </div>
            </div>

            <div class="control-group">
                <label>Mode</label>
                <div class="toggle-switch" id="input-toggle">
                    <span class="toggle-label active" data-value="touch">Touch/Mouse</span>
                    <span class="toggle-label" data-value="hardware">Keyboard</span>
                </div>
            </div>

            <div class="control-group recording-controls">
                <button id="record-btn" class="glass-btn">Record</button>
                <button id="stop-btn" class="glass-btn" disabled>Stop & Download</button>
            </div>
        </header>

        <div class="glass-panel ribbon-container" id="ribbon">
            <div class="arrow left-arrow">‹</div>
            <div id="octave-display">Current: C3 - B4</div>
            <div class="arrow right-arrow">›</div>
        </div>

        <div class="piano-chassis glass-panel">
            <div id="piano-viewport">
                <div id="piano-keys-container">
                    <!-- Keys will be generated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
